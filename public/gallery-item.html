<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://www.maisonaffluency.com/#gallery" />
    <!-- Fallback OG tags for crawlers that don't follow redirects -->
    <title>Interactive Gallery — Maison Affluency</title>
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Maison Affluency" />
    <meta property="og:title" content="Interactive Gallery — Maison Affluency" />
    <meta property="og:description" content="Explore our curated interactive gallery of luxury furniture and collectible design." />
    <meta property="og:image" content="https://res.cloudinary.com/dif1oamtj/image/upload/w_1200,h_630,c_fill,q_auto:best,f_jpg/bespoke-sofa_gxidtx.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Interactive Gallery — Maison Affluency" />
    <meta name="twitter:image" content="https://res.cloudinary.com/dif1oamtj/image/upload/w_1200,h_630,c_fill,q_auto:best,f_jpg/bespoke-sofa_gxidtx.jpg" />
  </head>
  <body>
    <script>
      (function(){
        var p = new URLSearchParams(location.search);
        var item = p.get("item") || "0";
        var designer = p.get("designer") || "";
        // Human visitor: store deep-link params and go to SPA
        sessionStorage.setItem("openGalleryIndex", item);
        if (designer) sessionStorage.setItem("galleryFilterDesigner", designer);
        window.location.replace("https://www.maisonaffluency.com/#gallery");
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0;url=https://www.maisonaffluency.com/#gallery" />
    </noscript>
  </body>
</html>
